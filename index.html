<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CouponCash – Claim Your Money</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00e87a;
    --dark: #0a0f0d;
    --card: #111a15;
    --border: #1e2e24;
    --text: #e8f5ee;
    --muted: #6b8f78;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    background-image: radial-gradient(ellipse at 20% 20%, #00e87a11 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 80%, #00e87a08 0%, transparent 60%);
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    color: var(--green);
    letter-spacing: -1px;
    margin-bottom: 6px;
    text-align: center;
  }
  .tagline {
    color: var(--muted);
    font-size: 0.9rem;
    text-align: center;
    margin-bottom: 32px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 24px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 0 60px #00e87a0a;
  }
  .card h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.3rem;
    margin-bottom: 24px;
    color: var(--text);
  }
  .form-group {
    margin-bottom: 16px;
  }
  label {
    display: block;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input, select {
    width: 100%;
    background: #0d1510;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border 0.2s;
  }
  input:focus, select:focus {
    border-color: var(--green);
  }
  select option { background: #0d1510; }
  .coupon-box {
    display: flex;
    gap: 10px;
  }
  .coupon-box input { flex: 1; text-transform: uppercase; letter-spacing: 2px; }
  .btn {
    background: var(--green);
    color: #0a0f0d;
    border: none;
    border-radius: 10px;
    padding: 14px 20px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }
  .msg {
    text-align: center;
    padding: 12px;
    border-radius: 10px;
    font-size: 0.9rem;
    margin-top: 12px;
    display: none;
  }
  .msg.success { background: #00e87a18; color: var(--green); border: 1px solid #00e87a30; display: block; }
  .msg.error { background: #ff4b4b18; color: #ff7070; border: 1px solid #ff4b4b30; display: block; }
  .admin-link {
    text-align: center;
    margin-top: 24px;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .admin-link a { color: var(--green); text-decoration: none; }

  /* ADMIN PANEL */
  .admin-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 24px;
    width: 100%;
    max-width: 480px;
    display: none;
  }
  .admin-card h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.3rem;
    margin-bottom: 20px;
    color: var(--green);
  }
  .coupon-list { margin-top: 20px; }
  .coupon-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #0d1510;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    font-size: 0.9rem;
  }
  .coupon-item .code {
    font-family: 'Syne', sans-serif;
    color: var(--green);
    letter-spacing: 2px;
  }
  .coupon-item .amount { color: var(--muted); }
  .coupon-item .status-used { color: #ff7070; font-size: 0.75rem; }
  .coupon-item .status-active { color: var(--green); font-size: 0.75rem; }
  .back-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 10px;
    padding: 10px 16px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    margin-bottom: 20px;
    font-size: 0.85rem;
  }
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid #0a0f0d;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- USER PAGE -->
<div id="userPage">
  <div class="logo">💸 CouponCash</div>
  <div class="tagline">Enter your details and claim your cash instantly</div>

  <div class="card">
    <h2>Claim Your Money</h2>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="fullname" placeholder="e.g. Amaka Johnson">
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@email.com">
    </div>

    <div class="form-group">
      <label>Bank Name</label>
      <select id="bank">
        <option value="">Select your bank</option>
        <option value="044">Access Bank</option>
        <option value="023">Citibank</option>
        <option value="050">EcoBank</option>
        <option value="011">First Bank</option>
        <option value="214">First City Monument Bank</option>
        <option value="070">Fidelity Bank</option>
        <option value="058">GTBank</option>
        <option value="030">Heritage Bank</option>
        <option value="301">Jaiz Bank</option>
        <option value="082">Keystone Bank</option>
        <option value="526">Moniepoint</option>
        <option value="999992">OPay</option>
        <option value="999991">PalmPay</option>
        <option value="076">Polaris Bank</option>
        <option value="101">Providus Bank</option>
        <option value="221">Stanbic IBTC</option>
        <option value="068">Standard Chartered</option>
        <option value="232">Sterling Bank</option>
        <option value="100">Suntrust Bank</option>
        <option value="032">Union Bank</option>
        <option value="033">UBA</option>
        <option value="215">Unity Bank</option>
        <option value="035">Wema Bank</option>
        <option value="057">Zenith Bank</option>
      </select>
    </div>

    <div class="form-group">
      <label>Account Number</label>
      <input type="tel" id="accountNumber" placeholder="10-digit account number" maxlength="10">
    </div>

    <hr class="divider">

    <div class="form-group">
      <label>Coupon Code</label>
      <div class="coupon-box">
        <input type="text" id="couponCode" placeholder="e.g. GIFT500">
      </div>
    </div>

    <button class="btn" id="claimBtn" onclick="claimCoupon()">Claim My Cash 💰</button>
    <div class="msg" id="userMsg"></div>
  </div>

  <div class="admin-link">
    Admin? <a href="#" onclick="showAdmin()">Login here</a>
  </div>
</div>

<!-- ADMIN LOGIN -->
<div id="adminLoginPage" style="display:none; width:100%; max-width:420px;">
  <div class="logo">💸 CouponCash</div>
  <div class="tagline">Admin Access Only</div>
  <div class="card">
    <h2>Admin Login</h2>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="adminPass" placeholder="Enter admin password">
    </div>
    <button class="btn" onclick="adminLogin()">Login</button>
    <div class="msg" id="adminLoginMsg"></div>
    <div style="text-align:center; margin-top:16px;">
      <a href="#" onclick="showUser()" style="color:var(--muted); font-size:0.85rem;">← Back</a>
    </div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPage" style="display:none; width:100%; max-width:480px;">
  <div class="logo">💸 CouponCash</div>
  <div class="tagline">Admin Panel</div>
  <div class="admin-card" id="adminCard" style="display:block;">
    <button class="back-btn" onclick="showUser()">← Logout</button>
    <h2>Create Coupon Code</h2>

    <div class="form-group">
      <label>Coupon Code</label>
      <input type="text" id="newCode" placeholder="e.g. GIFT1000" style="text-transform:uppercase;">
    </div>
    <div class="form-group">
      <label>Amount (₦)</label>
      <input type="number" id="newAmount" placeholder="e.g. 1000">
    </div>
    <button class="btn" onclick="createCoupon()">Create Coupon ✅</button>
    <div class="msg" id="adminMsg"></div>

    <hr class="divider">
    <h2>All Coupons</h2>
    <div class="coupon-list" id="couponList"></div>
  </div>
</div>

<script>
  // CONFIG
  const FLW_PUBLIC_KEY = 'FLWPUBK_TEST-d0770cbbccbf2ddd97032cd1a94bb564-X';
  const FLW_SECRET_KEY = 'FLWSECK_TEST-6e58544322475f2af1796fc0290a5aa1-X';
  const ADMIN_PASSWORD = 'admin123'; // Change this!

  // Storage helpers
  function getCoupons() {
    return JSON.parse(localStorage.getItem('coupons') || '[]');
  }
  function saveCoupons(c) {
    localStorage.setItem('coupons', JSON.stringify(c));
  }

  // Navigation
  function showAdmin() {
    document.getElementById('userPage').style.display = 'none';
    document.getElementById('adminLoginPage').style.display = 'flex';
    document.getElementById('adminLoginPage').style.flexDirection = 'column';
    document.getElementById('adminLoginPage').style.alignItems = 'center';
    document.getElementById('adminPage').style.display = 'none';
  }
  function showUser() {
    document.getElementById('userPage').style.display = 'block';
    document.getElementById('adminLoginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'none';
  }
  function showAdminPanel() {
    document.getElementById('userPage').style.display = 'none';
    document.getElementById('adminLoginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'flex';
    document.getElementById('adminPage').style.flexDirection = 'column';
    document.getElementById('adminPage').style.alignItems = 'center';
    renderCoupons();
  }

  // Admin login
  function adminLogin() {
    const pass = document.getElementById('adminPass').value;
    if (pass === ADMIN_PASSWORD) {
      showAdminPanel();
    } else {
      showMsg('adminLoginMsg', 'Wrong password!', 'error');
    }
  }

  // Create coupon
  function createCoupon() {
    const code = document.getElementById('newCode').value.trim().toUpperCase();
    const amount = parseFloat(document.getElementById('newAmount').value);
    if (!code || !amount) return showMsg('adminMsg', 'Fill in all fields!', 'error');
    const coupons = getCoupons();
    if (coupons.find(c => c.code === code)) return showMsg('adminMsg', 'Code already exists!', 'error');
    coupons.push({ code, amount, used: false, usedBy: null });
    saveCoupons(coupons);
    document.getElementById('newCode').value = '';
    document.getElementById('newAmount').value = '';
    showMsg('adminMsg', `Coupon ${code} created for ₦${amount}!`, 'success');
    renderCoupons();
  }

  // Render coupons
  function renderCoupons() {
    const list = document.getElementById('couponList');
    const coupons = getCoupons();
    if (coupons.length === 0) {
      list.innerHTML = '<p style="color:var(--muted); font-size:0.85rem;">No coupons yet.</p>';
      return;
    }
    list.innerHTML = coupons.map(c => `
      <div class="coupon-item">
        <div>
          <div class="code">${c.code}</div>
          ${c.used ? `<div class="status-used">Used by ${c.usedBy}</div>` : '<div class="status-active">● Active</div>'}
        </div>
        <div class="amount">₦${c.amount.toLocaleString()}</div>
      </div>
    `).join('');
  }

  // Claim coupon
  async function claimCoupon() {
    const name = document.getElementById('fullname').value.trim();
    const email = document.getElementById('email').value.trim();
    const bank = document.getElementById('bank').value;
    const account = document.getElementById('accountNumber').value.trim();
    const code = document.getElementById('couponCode').value.trim().toUpperCase();

    if (!name || !email || !bank || !account || !code) {
      return showMsg('userMsg', 'Please fill in all fields!', 'error');
    }
    if (account.length !== 10) {
      return showMsg('userMsg', 'Account number must be 10 digits!', 'error');
    }

    const coupons = getCoupons();
    const coupon = coupons.find(c => c.code === code);

    if (!coupon) return showMsg('userMsg', 'Invalid coupon code!', 'error');
    if (coupon.used) return showMsg('userMsg', 'This coupon has already been used!', 'error');

    const btn = document.getElementById('claimBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Processing...';

    try {
      // Verify account via Flutterwave
      const verifyRes = await fetch(`https://api.flutterwave.com/v3/accounts/resolve`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${FLW_SECRET_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ account_number: account, account_bank: bank })
      });
      const verifyData = await verifyRes.json();

      if (verifyData.status !== 'success') {
        btn.disabled = false;
        btn.innerHTML = 'Claim My Cash 💰';
        return showMsg('userMsg', 'Could not verify account. Check your details!', 'error');
      }

      // Transfer money
      const transferRes = await fetch('https://api.flutterwave.com/v3/transfers', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${FLW_SECRET_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          account_bank: bank,
          account_number: account,
          amount: coupon.amount,
          narration: `CouponCash Giveaway - ${code}`,
          currency: 'NGN',
          reference: `CC-${code}-${Date.now()}`,
          beneficiary_name: name
        })
      });
      const transferData = await transferRes.json();

      if (transferData.status === 'success') {
        // Mark coupon as used
        coupon.used = true;
        coupon.usedBy = name;
        saveCoupons(coupons);
        showMsg('userMsg', `🎉 Success! ₦${coupon.amount.toLocaleString()} is on its way to your account!`, 'success');
      } else {
        showMsg('userMsg', transferData.message || 'Transfer failed. Try again!', 'error');
      }
    } catch (e) {
      showMsg('userMsg', 'Network error. Please try again!', 'error');
    }

    btn.disabled = false;
    btn.innerHTML = 'Claim My Cash 💰';
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = `msg ${type}`;
  }
</script>
</body>
</html>
